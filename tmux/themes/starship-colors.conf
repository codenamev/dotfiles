# Starship-coordinated color theme
# Based on existing orange/gray scheme + starship palette

# Base colors
set -g @orange '#ff9500'
set -g @dark_gray '#1e1e2e'
set -g @light_gray '#6c6f85'
set -g @bright_blue '#89b4fa'
set -g @bright_green '#a6e3a1'
set -g @bright_red '#f38ba8'
set -g @bright_yellow '#f9e2af'

# Status bar colors
# - colour235: Dark gray background (matches terminal background)
# - colour250: Light gray text (readable, not harsh)
set -g status-style bg=colour235,fg=colour250

# Session indicator (left side)
# - colour166: Orange background (matches starship accent color)
# - colour229: Light yellow text (high contrast with orange)
set -g status-left-style fg=colour229,bg=colour166

# Right status area (clock, battery, etc.)
# - Inherits from main status bar for consistency
set -g status-right-style fg=colour250,bg=colour235

# Window status colors
# Inactive windows: subtle gray-on-gray
set -g window-status-style fg=colour250,bg=colour235

# Active window: bright blue highlight
# - colour31: Blue background (visual distinction)
# - colour117: Light blue text (complements background)
set -g window-status-current-style fg=colour117,bg=colour31
